import_history:
  fields:
    csv_path:
      required: false
      example: /config/imsys_export.csv
      selector:
        text: {}
    start_date:
      required: false
      example: "2026-01-01"
      selector:
        date: {}
    start_value:
      required: false
      example: 851
      selector:
        number:
          min: 0
          step: 0.01
          unit_of_measurement: kWh
          mode: box
    source_entity:
      required: false
      example: sensor.haus_strom_energie
      selector:
        entity:
          domain: sensor
    target_entity:
      required: false
      example: sensor.smartmeter_bezug
      selector:
        entity:
          domain: sensor
    monthly_kwh:
      required: false
      example: '{"2026-01": 130.5, "2026-03": 95}'
      selector:
        object: {}
    dry_run:
      required: false
      default: false
      selector:
        boolean: {}
repair_statistics_reset:
  fields:
    since:
      required: true
      example: "2026-07-21 09:00:00"
      selector:
        datetime: {}
    target_entity:
      required: false
      example: sensor.keller_ppc_smgw_1_8_0
      selector:
        entity:
          domain: sensor
    dry_run:
      required: false
      default: false
      selector:
        boolean: {}
repair_erroneous_ramp:
  fields:
    ramp_start:
      required: true
      example: "2026-07-20 22:00:00"
      selector:
        datetime: {}
    ramp_end:
      required: true
      example: "2026-07-21 10:00:00"
      selector:
        datetime: {}
    target_entity:
      required: false
      example: sensor.keller_ppc_smgw_1_8_0
      selector:
        entity:
          domain: sensor
    dry_run:
      required: false
      default: false
      selector:
        boolean: {}
